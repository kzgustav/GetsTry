                            <span className={`inline-block px-1 py-0.5 text-[8px] font-black rounded mr-1 ${r.category === '料理' ? 'bg-orange-50 text-orange-600' : r.category === '飲料' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}`}>{r.category}</span>
                            <span className="font-bold text-textmain">{r.itemName}</span>
                            {r.spec && <span className="text-slate-400 ml-1">({r.spec})</span>}
                          </div>
                          <span className="text-slate-400 font-mono shrink-0 ml-2">{formatPrice(r.baseNewPrice)}</span>
                        </div>
                      ))}
                    </div>
                    {resolved.length > 0 && (
                      <>
                        <h4 className="font-black text-sm text-teal-700 mt-4 mb-2 flex items-center gap-1"><Check size={14}/> 容量解析成功 ({resolved.length}件)</h4>
                        <div className="space-y-1">
                          {resolved.sort((a,b) => (b.volumeUnitPrice?.pricePerUnit || 0) - (a.volumeUnitPrice?.pricePerUnit || 0)).map(r => (
                            <div key={r.id} className="flex items-center justify-between bg-white p-2 rounded-lg border border-teal-100 text-xs">
                              <div className="flex-1 min-w-0">
                                <span className={`inline-block px-1 py-0.5 text-[8px] font-black rounded mr-1 ${r.category === '料理' ? 'bg-orange-50 text-orange-600' : r.category === '飲料' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}`}>{r.category}</span>
                                <span className="font-bold text-textmain">{r.itemName}</span>
                                {r.spec && <span className="text-slate-400 ml-1">({r.spec})</span>}
                              </div>
                              <div className="shrink-0 ml-2 text-right">
                                <span className="font-black text-teal-700">{r.volumeUnitPrice.pricePerUnit.toFixed(2)}{r.volumeUnitPrice.unit}</span>
                                <span className="text-slate-400 ml-1">({r.volumeUnitPrice.volume.raw})</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* 紐付けモーダル */}
          {linkModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden border border-slate-200">
                <div className="p-4 border-b border-bordercol flex justify-between items-center bg-slate-50">
                  <h3 className="font-black text-textmain flex items-center gap-2"><LinkIcon size={18} className="text-brand" /> 前月商品と手動で紐付け</h3>
                  <button onClick={() => setLinkModal({isOpen:false, targetItem:null, searchQuery:''})} className="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-md"><XIcon size={20}/></button>
                </div>
                <div className="p-4 border-b border-bordercol bg-white flex flex-col gap-3">
                  <div className="text-xs text-textmuted font-bold">以下の当月商品に対する前月の「切り替え元」を選択してください。</div>
                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                    <div className="text-[10px] text-blue-600 font-bold mb-1">{linkModal.targetItem.shop} / {linkModal.targetItem.supplier}</div>
                    <div className="text-sm font-black text-textmain">{linkModal.targetItem.itemName}</div>
                  </div>
                  <input type="text" placeholder="前月商品名や業者名で検索..." value={linkModal.searchQuery} onChange={(e) => setLinkModal({...linkModal, searchQuery: e.target.value})} className="w-full text-sm font-bold border-2 border-slate-200 rounded-lg pl-3 pr-3 py-2 bg-slate-50 text-slate-700 outline-none focus:border-brand focus:bg-white"/>
                </div>
                <div className="flex-1 overflow-y-auto p-3 bg-slate-50">
                  {(() => {
                    const query = linkModal.searchQuery.toLowerCase();
                    const targetShop = linkModal.targetItem.shop;
                    let filtered = prevItemsList.filter(p => !config.specialKeywords.some(keyword => p.name.includes(keyword)));
                    if (query) filtered = filtered.filter(p => p.name.toLowerCase().includes(query) || p.supplier.toLowerCase().includes(query));
                    else filtered = filtered.filter(p => p.shop === targetShop);
                    if (filtered.length === 0) return <div className="p-8 text-center text-sm font-bold text-slate-400">候補が見つかりません。</div>;
                    return (
                      <div className="space-y-2">
                        {filtered.map(p => (
                          <div key={p.code} className="flex items-center justify-between bg-white p-3 rounded-xl border border-bordercol shadow-sm hover:border-brand hover:shadow-md transition-all cursor-pointer group" onClick={() => handleApplyLink(p)}>
                            <div className="flex-1 overflow-hidden pr-3">
                              <div className="text-[10px] text-slate-500 font-bold flex gap-2"><span>{p.shop}</span><span className="text-slate-300">|</span><span className="text-brand">{p.supplier}</span></div>
                              <div className="text-sm md:text-base font-black text-textmain mt-1 group-hover:text-brand transition-colors break-words">{p.name}</div>
                              {p.spec && <div className="text-xs text-slate-600 mt-1 bg-slate-100 px-1.5 py-0.5 rounded w-fit">{p.spec}</div>}
                              <div className="text-xs text-slate-500 font-mono mt-1.5">単位: {p.unit || '-'} | 前月単価: <span className="font-bold text-slate-700">{formatPrice(p.price)}</span></div>
                            </div>
                            <button className="shrink-0 px-4 py-2 bg-slate-100 group-hover:bg-brand text-slate-600 group-hover:text-white text-sm font-black rounded-lg transition-colors shadow-sm border border-slate-200 group-hover:border-brand">選択</button>
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
